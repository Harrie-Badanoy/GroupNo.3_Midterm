<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started | SkillMentor Inc.</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<nav>
    <div class="nav-left">
        <label for="sidebar-toggle" class="hamburger">&#9776;</label>
        <div class="logo">SkillMentor <span>Inc.</span></div>
    </div>

    <div class="nav-center">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="mentors.html">Mentors</a></li>
            <li><a href="categories.html">Categories</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>
</nav>

<input type="checkbox" id="sidebar-toggle">

<!-- SIDEBAR -->
<aside class="sidebar">
    <ul>
        <li><a href="#">Dashboard</a></li>
        <li><a href="#">My Courses</a></li>
        <li><a href="#">Profile</a></li>
        <li><a href="#">Settings</a></li>
    </ul>
</aside>


<div class="getstarted-page">

    <div class="container">

        <h2>Get Started</h2>

        <div class="buttons">
            <a href="#loginchoice">Login</a>
            <a href="#signup">Sign Up</a>
        </div>

        <!-- LOGIN CHOICE -->

        <div id="loginchoice" class="form-box">

            <h3>Login As</h3>

            <div class="role-buttons">
                <a href="#mentorlogin">Mentor</a>
                <a href="#studentlogin">Student</a>
            </div>

        </div>


        <!-- MENTOR LOGIN -->

        <div id="mentorlogin" class="form-box">

            <h3>Mentor Login</h3>

            <form>

                <input type="email" placeholder="Email" required>

                <input type="password" placeholder="Password" required>

                <button type="submit">Login as Mentor</button>

            </form>

        </div>


        <!-- STUDENT LOGIN -->

        <div id="studentlogin" class="form-box">

            <h3>Student Login</h3>

            <form>

                <input type="email" placeholder="Email" required>

                <input type="password" placeholder="Password" required>

                <button type="submit">Login as Student</button>

            </form>

        </div>


        <!-- SIGNUP CHOICE -->

        <div id="signup" class="form-box">

            <h3>Sign Up As</h3>

            <div class="role-buttons">
                <a href="#mentor">Mentor</a>
                <a href="#student">Student</a>
            </div>

        </div>


        <!-- MENTOR SIGNUP -->

        <div id="mentor" class="form-box">

            <h3>Mentor Registration</h3>

            <form>

                <input type="text" placeholder="Full Name" required>

                <input type="email" placeholder="Email" required>

                <input type="text" placeholder="Expertise (Example: Programming)" required>

                <input type="password" placeholder="Password" required>

                <button type="submit">Register as Mentor</button>

            </form>

        </div>


        <!-- STUDENT SIGNUP -->

        <div id="student" class="form-box">

            <h3>Student Registration</h3>

            <form>

                <input type="text" placeholder="Full Name" required>

                <input type="email" placeholder="Email" required>

                <input type="text" placeholder="Field of Interest" required>

                <input type="password" placeholder="Password" required>

                <button type="submit">Register as Student</button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
